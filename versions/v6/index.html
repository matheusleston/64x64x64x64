<!doctype html>
<meta charset="utf-8" />
<title>64x64x64x64 — visualizador</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    background: #0a0a0c; color: #e6e6e6;
    font: 14px/1.4 system-ui, sans-serif;
  }
  .wrap { display: grid; gap: 14px; justify-items: center; }
  canvas {
    width: 512px; height: 512px;
    image-rendering: pixelated;
    background: #000; border-radius: 6px;
    box-shadow: 0 0 60px rgba(80,120,255,.15);
  }
  .meta { opacity: .6; font-variant-numeric: tabular-nums; font-size: 12px; }

  /* Painel dos 3 "encoders": slider + valor + botão. */
  .panel { display: grid; gap: 10px; width: 512px; }
  .ctl {
    display: grid; grid-template-columns: 110px 1fr 56px 130px;
    align-items: center; gap: 10px;
  }
  .ctl label { opacity: .8; }
  .ctl .val { text-align: right; font-variant-numeric: tabular-nums; opacity: .7; }
  input[type=range] { width: 100%; accent-color: #6f8cff; }
  button {
    appearance: none; cursor: pointer;
    background: #1b1d24; color: #e6e6e6;
    border: 1px solid #34384a; border-radius: 6px;
    padding: 7px 10px; font: inherit;
  }
  button:hover { background: #242736; }
  button:active { background: #2c3043; }
  button.on { border-color: #6f8cff; color: #cdd6ff; }
</style>

<div class="wrap">
  <canvas id="screen" width="64" height="64"></canvas>
  <div class="meta" id="meta">carregando WASM…</div>

  <div class="panel">
    <div class="ctl">
      <label>Hue · enc 1</label>
      <input type="range" id="hue" min="0" max="255" value="0" />
      <span class="val" id="hueVal"></span>
      <button id="hueBtn">inverter range</button>
    </div>
    <div class="ctl">
      <label>Range hue · enc 2</label>
      <input type="range" id="range" min="0" max="100" value="50" />
      <span class="val" id="rangeVal"></span>
      <button id="rangeBtn">hue linear</button>
    </div>
    <div class="ctl">
      <label>Luminância · enc 3</label>
      <input type="range" id="lum" min="50" max="100" value="50" />
      <span class="val" id="lumVal"></span>
      <button id="lumBtn">novo desenho</button>
    </div>
  </div>
</div>

<script src="viz.js"></script>
<script>
  createViz().then((Module) => {
    const W = Module._viz_width();
    const H = Module._viz_height();
    const canvas = document.getElementById("screen");
    canvas.width = W; canvas.height = H;
    const meta = document.getElementById("meta");
    const ctx = canvas.getContext("2d");
    const img = ctx.createImageData(W, H);

    // Semeia o padrão inicial com entropia do navegador.
    Module._viz_seed((Date.now() ^ (Math.random() * 0x100000000)) >>> 0);

    // --- Controles dos 3 encoders -------------------------------------------
    const hue = document.getElementById("hue");
    const range = document.getElementById("range");
    const lum = document.getElementById("lum");
    const hueVal = document.getElementById("hueVal");
    const rangeVal = document.getElementById("rangeVal");
    const lumVal = document.getElementById("lumVal");

    const syncHue = () => { Module._viz_setHueBase(+hue.value); hueVal.textContent = hue.value; };
    const syncRange = () => { Module._viz_setHueRange(+range.value); rangeVal.textContent = range.value + "%"; };
    const syncLum = () => { Module._viz_setLumMax(+lum.value); lumVal.textContent = lum.value + "%"; };
    hue.oninput = syncHue; range.oninput = syncRange; lum.oninput = syncLum;
    syncHue(); syncRange(); syncLum();   // empurra os valores iniciais ao efeito

    const hueBtn = document.getElementById("hueBtn");
    const rangeBtn = document.getElementById("rangeBtn");
    hueBtn.onclick = () => { Module._viz_toggleHueInvert(); hueBtn.classList.toggle("on"); };
    rangeBtn.onclick = () => { Module._viz_toggleHueCurve(); rangeBtn.classList.toggle("on"); };
    document.getElementById("lumBtn").onclick = () => Module._viz_newPattern();

    // --- Loop de render ------------------------------------------------------
    let animFrame = 0;
    let tick = 0;
    let frames = 0, lastFps = performance.now(), fps = 0;
    const FRAMES_PER_STEP = 2;

    function frame(now) {
      const ptr = Module._viz_render(animFrame);
      const src = Module.HEAPU8.subarray(ptr, ptr + W * H * 3);
      const dst = img.data;
      for (let i = 0, j = 0; i < W * H; i++, j += 3) {
        dst[i * 4 + 0] = src[j + 0];
        dst[i * 4 + 1] = src[j + 1];
        dst[i * 4 + 2] = src[j + 2];
        dst[i * 4 + 3] = 255;
      }
      ctx.putImageData(img, 0, 0);

      tick++;
      if (tick % FRAMES_PER_STEP === 0) animFrame++;
      frames++;
      if (now - lastFps > 500) {
        fps = Math.round((frames * 1000) / (now - lastFps));
        frames = 0; lastFps = now;
        const info = Module.UTF8ToString(Module._viz_info());
        meta.textContent = `${W}x${H} · ${fps} fps · ${info}`;
      }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  });
</script>
